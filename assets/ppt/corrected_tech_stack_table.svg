 <!-- tile helper groups -->
 <g><rect x="850" y="190" width="82" height="70" class="tile" fill="#fff"/><text x="891" y="234" text-anchor="middle" style="font:700 25px Arial;fill:#087cf0">S</text><text x="891" y="282" text-anchor="middle" class="tilabel">SAM 2.1</text><rect x="970" y="190" width="82" height="70" class="tile" fill="#7b3df1" stroke="#7b3df1"/><text x="1011" y="234" text-anchor="middle" class="tiletext">SD</text><text x="1011" y="282" text-anchor="middle" class="tilabel">Stable Diffusion</text><rect x="1090" y="190" width="82" height="70" class="tile" fill="#252525" stroke="#252525"/><text x="1131" y="234" text-anchor="middle" class="tiletext">CN</text><text x="1131" y="282" text-anchor="middle" class="tilabel">ControlNet</text><rect x="1210" y="190" width="82" height="70" class="tile" fill="#fff"/><text x="1251" y="234" text-anchor="middle" style="font:700 20px Arial;fill:#7150d5">OCV</text><text x="1251" y="282" text-anchor="middle" class="tilabel">OpenCV</text></g>
 <g><rect x="1580" y="190" width="70" height="70" class="tile" fill="#111" stroke="#111"/><text x="1615" y="234" text-anchor="middle" class="tiletext">F</text><text x="1615" y="282" text-anchor="middle" class="tilabel">FASHN Try-On</text><rect x="1690" y="190" width="70" height="70" class="tile" fill="#fff"/><text x="1725" y="234" text-anchor="middle" style="font:700 25px Arial;fill:#9a83bc">✦</text><text x="1725" y="282" text-anchor="middle" class="tilabel">Gemini Image</text><rect x="1800" y="190" width="70" height="70" class="tile" fill="#fff"/><text x="1835" y="234" text-anchor="middle" style="font:700 21px Arial;fill:#f3bb22">HF</text><text x="1835" y="282" text-anchor="middle" class="tilabel">HF fallbacks</text><rect x="1910" y="190" width="70" height="70" class="tile" fill="#fff"/><text x="1945" y="234" text-anchor="middle" style="font:700 18px Arial;fill:#4e83c8">GV</text><text x="1945" y="282" text-anchor="middle" class="tilabel">Vision optional</text></g>
 <text x="2058" y="218" class="desc">FASHN → Gemini image → HF Space/FLUX → Stable Diffusion; OpenCV</text><text x="2058" y="243" class="desc">quality check and optional Google Vision source check; non-wearables reuse photos.</text>

 <g><rect x="850" y="358" width="82" height="70" class="tile" fill="#fff"/><text x="891" y="402" text-anchor="middle" style="font:700 24px Arial;fill:#5b4bd8">CLIP</text><text x="891" y="450" text-anchor="middle" class="tilabel">CLIP</text><rect x="970" y="358" width="82" height="70" class="tile" fill="#fff"/><text x="1011" y="402" text-anchor="middle" style="font:700 22px Arial;fill:#e95338">R</text><text x="1011" y="450" text-anchor="middle" class="tilabel">ResNet-50</text></g>
 <g><rect x="1610" y="358" width="82" height="70" class="tile" fill="#fff"/><text x="1651" y="402" text-anchor="middle" style="font:700 28px Arial;fill:#9a83bc">✦</text><text x="1651" y="450" text-anchor="middle" class="tilabel">Gemini Vision</text><rect x="1740" y="358" width="82" height="70" class="tile" fill="#fff"/><text x="1781" y="402" text-anchor="middle" style="font:700 19px Arial;fill:#e95338">G</text><text x="1781" y="450" text-anchor="middle" class="tilabel">Groq fallback</text></g>
 <text x="2058" y="386" class="desc">Label/tag photo is read by multimodal reasoning; CLIP + ResNet</text><text x="2058" y="411" class="desc">fill visual gaps only. Printed label values are never overridden.</text>

 <g><rect x="850" y="526" width="82" height="70" class="tile" fill="#5c62e9" stroke="#5c62e9"/><text x="891" y="570" text-anchor="middle" class="tiletext">M</text><text x="891" y="618" text-anchor="middle" class="tilabel">MiniLM embed</text></g>
 <g><rect x="1610" y="526" width="82" height="70" class="tile" fill="#416fe8" stroke="#416fe8"/><text x="1651" y="570" text-anchor="middle" class="tiletext">P</text><text x="1651" y="618" text-anchor="middle" class="tilabel">Pinecone</text><rect x="1740" y="526" width="82" height="70" class="tile" fill="#fff"/><text x="1781" y="570" text-anchor="middle" style="font:700 28px Arial;fill:#9a83bc">✦</text><text x="1781" y="618" text-anchor="middle" class="tilabel">Gemini</text></g>
 <text x="2058" y="554" class="desc">Recommends from measurements, recent fit history and peer size charts;</text><text x="2058" y="579" class="desc">measurement fallback if retrieval/reasoning is unavailable; buyer chooses size.</text>

 <g><rect x="850" y="694" width="82" height="70" class="tile" fill="#fff"/><text x="891" y="738" text-anchor="middle" style="font:700 21px Arial;fill:#5b4bd8">CLIP</text><text x="891" y="786" text-anchor="middle" class="tilabel">CLIP</text><rect x="970" y="694" width="82" height="70" class="tile" fill="#f8a619" stroke="#f8a619"/><text x="1011" y="738" text-anchor="middle" class="tiletext">B</text><text x="1011" y="786" text-anchor="middle" class="tilabel">mBERT</text><rect x="1090" y="694" width="82" height="70" class="tile" fill="#fff"/><text x="1131" y="738" text-anchor="middle" style="font:700 20px Arial;fill:#ef4b42">R</text><text x="1131" y="786" text-anchor="middle" class="tilabel">Redis Streams</text></g>
 <text x="1660" y="738" class="desc" fill="#39835a">None — self-hosted, ₹0 per review</text><text x="2058" y="722" class="desc">Runs automatically after a review event. CLIP checks photo-product match;</text><text x="2058" y="747" class="desc">mBERT checks text relevance. Unrelated media is hidden; text/rating stays.</text>

 <g><rect x="850" y="862" width="82" height="70" class="tile" fill="#5c62e9" stroke="#5c62e9"/><text x="891" y="906" text-anchor="middle" class="tiletext">M</text><text x="891" y="954" text-anchor="middle" class="tilabel">MiniLM embed</text></g>
 <g><rect x="1610" y="862" width="82" height="70" class="tile" fill="#ff6a20" stroke="#ff6a20"/><text x="1651" y="906" text-anchor="middle" class="tiletext">Sv</text><text x="1651" y="954" text-anchor="middle" class="tilabel">Sarvam STT/TTS</text><rect x="1740" y="862" width="82" height="70" class="tile" fill="#416fe8" stroke="#416fe8"/><text x="1781" y="906" text-anchor="middle" class="tiletext">P</text><text x="1781" y="954" text-anchor="middle" class="tilabel">Pinecone</text><rect x="1870" y="862" width="82" height="70" class="tile" fill="#fff"/><text x="1911" y="906" text-anchor="middle" style="font:700 28px Arial;fill:#9a83bc">✦</text><text x="1911" y="954" text-anchor="middle" class="tilabel">Gemini</text></g>
 <text x="2058" y="890" class="desc">Hindi/Hinglish/English text and voice Q&amp;A grounded in verified specs,</text><text x="2058" y="915" class="desc">clean reviews and resolved Q&amp;A, with ownership checks and learning loop.</text>

 <g><rect x="850" y="1030" width="82" height="70" class="tile" fill="#0a920d" stroke="#0a920d"/><text x="891" y="1074" text-anchor="middle" class="tiletext">D</text><text x="891" y="1122" text-anchor="middle" class="tilabel">DIGIPIN</text><rect x="970" y="1030" width="82" height="70" class="tile" fill="#8b45b3" stroke="#8b45b3"/><text x="1011" y="1074" text-anchor="middle" class="tiletext">I</text><text x="1011" y="1122" text-anchor="middle" class="tilabel">IndicNLP</text><rect x="1090" y="1030" width="82" height="70" class="tile" fill="#fff"/><text x="1131" y="1074" text-anchor="middle" style="font:700 19px Arial;fill:#477f58">OSM</text><text x="1131" y="1122" text-anchor="middle" class="tilabel">Leaflet/OSM</text></g>
 <g><rect x="1610" y="1030" width="82" height="70" class="tile" fill="#fff"/><text x="1651" y="1074" text-anchor="middle" style="font:700 22px Arial;fill:#3678dc">Maps</text><text x="1651" y="1122" text-anchor="middle" class="tilabel">Google Maps</text><rect x="1740" y="1030" width="82" height="70" class="tile" fill="#fff"/><text x="1781" y="1074" text-anchor="middle" style="font:700 25px Arial;fill:#ef4055">Tw</text><text x="1781" y="1122" text-anchor="middle" class="tilabel">Twilio Lookup</text><rect x="1870" y="1030" width="82" height="70" class="tile" fill="#fff"/><text x="1911" y="1074" text-anchor="middle" style="font:700 28px Arial;fill:#9a83bc">✦</text><text x="1911" y="1122" text-anchor="middle" class="tilabel">Gemini/Groq</text></g>
 <text x="2058" y="1058" class="desc">Map coordinates + typed address are reconciled; DIGIPIN is generated and</text><text x="2058" y="1083" class="desc">phone is carrier-validated. Mismatch returns field-level correction; no address OTP.</text>

 <g><rect x="850" y="1198" width="82" height="70" class="tile" fill="#fff"/><text x="891" y="1242" text-anchor="middle" style="font:700 19px Arial;fill:#ef4b42">R</text><text x="891" y="1290" text-anchor="middle" class="tilabel">Redis Streams</text><rect x="970" y="1198" width="82" height="70" class="tile" fill="#551447" stroke="#551447"/><text x="1011" y="1242" text-anchor="middle" class="tiletext">OS</text><text x="1011" y="1290" text-anchor="middle" class="tilabel">Order state</text></g>
 <g><rect x="1580" y="1198" width="70" height="70" class="tile" fill="#fff"/><text x="1615" y="1242" text-anchor="middle" style="font:700 18px Arial;fill:#ef4055">Tw</text><text x="1615" y="1290" text-anchor="middle" class="tilabel">Twilio Voice/WA</text><rect x="1690" y="1198" width="70" height="70" class="tile" fill="#ff6a20" stroke="#ff6a20"/><text x="1725" y="1242" text-anchor="middle" class="tiletext">Sv</text><text x="1725" y="1290" text-anchor="middle" class="tilabel">Sarvam ASR/TTS</text><rect x="1800" y="1198" width="70" height="70" class="tile" fill="#fff"/><text x="1835" y="1242" text-anchor="middle" style="font:700 24px Arial;fill:#9a83bc">✦</text><text x="1835" y="1290" text-anchor="middle" class="tilabel">Gemini/Groq</text><rect x="1910" y="1198" width="70" height="70" class="tile" fill="#fff"/><text x="1945" y="1242" text-anchor="middle" style="font:700 20px Arial;fill:#e44b3d">@</text><text x="1945" y="1290" text-anchor="middle" class="tilabel">SMTP email</text></g>
 <text x="2058" y="1226" class="desc">`order.placed` triggers a call; reply is classified as confirm/reschedule/cancel.</text><text x="2058" y="1251" class="desc">Retries fall back to WhatsApp. Email OTP is a buyer-selected alternative.</text>

 <g><rect x="850" y="1366" width="82" height="70" class="tile" fill="#fff"/><text x="891" y="1410" text-anchor="middle" style="font:700 22px Arial;fill:#7150d5">OCV</text><text x="891" y="1458" text-anchor="middle" class="tilabel">OpenCV</text><rect x="970" y="1366" width="82" height="70" class="tile" fill="#fff"/><text x="1011" y="1410" text-anchor="middle" style="font:700 21px Arial;fill:#5b4bd8">CLIP</text><text x="1011" y="1458" text-anchor="middle" class="tilabel">CLIP</text><rect x="1090" y="1366" width="82" height="70" class="tile" fill="#fff"/><text x="1131" y="1410" text-anchor="middle" style="font:700 22px Arial;fill:#e95338">R</text><text x="1131" y="1458" text-anchor="middle" class="tilabel">ResNet-50</text></g>
 <g><rect x="1610" y="1366" width="82" height="70" class="tile" fill="#fff"/><text x="1651" y="1410" text-anchor="middle" style="font:700 28px Arial;fill:#9a83bc">✦</text><text x="1651" y="1458" text-anchor="middle" class="tilabel">Gemini Vision</text><rect x="1740" y="1366" width="82" height="70" class="tile" fill="#fff"/><text x="1781" y="1410" text-anchor="middle" style="font:700 19px Arial;fill:#e95338">G</text><text x="1781" y="1458" text-anchor="middle" class="tilabel">Groq fallback</text></g>
 <text x="2058" y="1394" class="desc">Return video → five OpenCV frames compared with catalogue image; best frame</text><text x="2058" y="1419" class="desc">is read for tag/label evidence. ≥75 approve · 40–74 more evidence · &lt;40 manual.</text>

 <g><rect x="850" y="1534" width="82" height="70" class="tile" fill="#fff"/><text x="891" y="1578" text-anchor="middle" style="font:700 21px Arial;fill:#172344">N</text><text x="891" y="1626" text-anchor="middle" class="tilabel">Next.js 16</text><rect x="970" y="1534" width="82" height="70" class="tile" fill="#fff"/><text x="1011" y="1578" text-anchor="middle" style="font:700 20px Arial;fill:#16a085">F</text><text x="1011" y="1626" text-anchor="middle" class="tilabel">FastAPI</text><rect x="1090" y="1534" width="82" height="70" class="tile" fill="#fff"/><text x="1131" y="1578" text-anchor="middle" style="font:700 19px Arial;fill:#326b9b">PG</text><text x="1131" y="1626" text-anchor="middle" class="tilabel">PostgreSQL 16</text><rect x="1210" y="1534" width="82" height="70" class="tile" fill="#fff"/><text x="1251" y="1578" text-anchor="middle" style="font:700 19px Arial;fill:#ef4b42">R</text><text x="1251" y="1626" text-anchor="middle" class="tilabel">Redis 7</text><rect x="1330" y="1534" width="82" height="70" class="tile" fill="#fff"/><text x="1371" y="1578" text-anchor="middle" style="font:700 19px Arial;fill:#5c5468">LG</text><text x="1371" y="1626" text-anchor="middle" class="tilabel">LangGraph</text></g>
 <g><rect x="1610" y="1534" width="82" height="70" class="tile" fill="#fff"/><text x="1651" y="1578" text-anchor="middle" style="font:700 19px Arial;fill:#172344">Rz</text><text x="1651" y="1626" text-anchor="middle" class="tilabel">Razorpay</text><rect x="1740" y="1534" width="82" height="70" class="tile" fill="#fff"/><text x="1781" y="1578" text-anchor="middle" style="font:700 19px Arial;fill:#ef4055">Tw</text><text x="1781" y="1626" text-anchor="middle" class="tilabel">Twilio</text><rect x="1870" y="1534" width="82" height="70" class="tile" fill="#fff"/><text x="1911" y="1578" text-anchor="middle" style="font:700 19px Arial;fill:#e44b3d">@</text><text x="1911" y="1626" text-anchor="middle" class="tilabel">SMTP</text></g>
 <text x="2058" y="1562" class="desc">One codebase with four role-scoped portals behind JWT auth; PostgreSQL source</text><text x="2058" y="1587" class="desc">of truth, Redis cache/events, LangGraph workflows and COD/Razorpay checkout.</text>

 <rect x="38" y="1672" width="3124" height="70" rx="0" fill="#f9f0f5"/><text x="1600" y="1715" text-anchor="middle" style="font:italic 14px 'DM Sans',Arial;fill:#9b8799">Verified against active code paths. Provider tiles are monogram placeholders and can be swapped for approved logos in PowerPoint.</text>
</svg>
